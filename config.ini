gun = Онлайн информация:\nСотрудник органов внутренних дел имеет право на применение оружия, то есть на производство выстрела (выстрелов) из него, в отношении лица:\n1. Совершающего нападение на сотрудника органов внутренних дел и (или) иного гражданина, когда их жизнь или здоровье подвергаются опасности;\n2. Совершающего нападение в составе группы или нападение, сопряженное с применением оружия либо взрывов, поджогов и иных общеопасных способов, использованием транспортных средств, машин или механизмов, на жилые помещения или иные законные владения граждан, помещения, иные объекты организаций, войсковой или служебный наряд органов внутренних дел, на лиц или объекты, охраняемые органами внутренних дел;\n3. Совершающего действие, непосредственно направленное на насильственное завладение находящимися у сотрудника органов внутренних дел оружием, боеприпасами к нему, боевой и специальной техникой или специальными средствами;\n4. Совершающего захват или удержание лица в качестве заложника;\n5. Застигнутого при совершении действий, указанных в абзацах втором–пятом настоящей части, и пытающегося скрыться;\n6. Совершающего побег из-под стражи, конвоя;\n7. Не подчинившегося законному требованию сотрудника органов внутренних дел немедленно сдать (положить) оружие, взрывчатое вещество, взрывное устройство или другие предметы, применение которых может угрожать жизни или здоровью сотрудника органов внутренних дел или иных граждан.\n8. Совершение лицом действий, правомерно запрещенных ему сотрудником органов внутренних дел и выражающихся в попытке приблизиться к сотруднику органов внутренних дел ближе указанного расстояния, достать что-либо из одежды или ручной клади, либо иных действий, которые могут быть истолкованы сотрудником органов внутренних дел как угроза применения насилия, опасного для жизни или здоровья его или иных граждан, предоставляет сотруднику органов внутренних дел право применить оружие в соответствии с настоящим Законом.\n9. Сотрудник органов внутренних дел имеет право на использование огнестрельного оружия, то есть на производство выстрела (выстрелов) из него, для: подачи сигнала тревоги или вызова помощи, обезвреживания животного, непосредственно угрожающего жизни или здоровью граждан;\n10. остановки транспортного средства путем его повреждения, если водитель не подчиняется заведомо очевидным для него законным неоднократным требованиям сотрудника органов внутренних дел об остановке транспортного средства и его действия создают реальную угрозу жизни или здоровью граждан либо имеются достоверные данные о том, что транспортным средством управляет лицо, совершившее тяжкое или особо тяжкое преступление.\n11. Сотрудник органов внутренних дел имеет право на применение оружия, в том числе огнестрельного, и на использование огнестрельного оружия также в иных случаях, определяемых Президентом Республики Беларусь.\n12. Сотрудник органов внутренних дел вправе привести оружие в готовность к стрельбе, если считает, что в создавшейся обстановке не исключена возможность его применения или использования.\n\nЗапрещается применять или использовать оружие:\n2.1 при значительном скоплении людей, когда от этого могут пострадать посторонние лица;\n2.2 в направлении складов (хранилищ), содержащих огнеопасные, взрывоопасные, а также сильнодействующие ядовитые вещества, и средств транспортировки этих веществ;\n2.3 в отношении женщин, лиц с явными признаками инвалидности, несовершеннолетних, когда их возраст очевиден или известен, за исключением случаев совершения указанными лицами вооруженного либо группового нападения или иных действий, угрожающих жизни или здоровью граждан.

